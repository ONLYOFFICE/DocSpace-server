grpc:
  client:
    registrationService:
      address: ${GRPC_CLIENT_REGISTRATION_ADDRESS:in-process:identity-minified}
      negotiation-type: ${GRPC_CLIENT_REGISTRATION_NEGOTIATION_TYPE:plaintext}
    authorizationService:
      address: ${GRPC_CLIENT_AUTHORIZATION_ADDRESS:in-process:identity-minified}
      negotiation-type: ${GRPC_CLIENT_AUTHORIZATION_NEGOTIATION_TYPE:plaintext}
  server:
    in-process-name: identity-minified
    port: ${GRPC_SERVER_PORT:-1}
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED:false}
      certificateChainPath: ${GRPC_SERVER_SECURITY_CERTIFICATE_PATH:classpath:certs/server.crt}
      privateKeyPath: ${GRPC_SERVER_SECURITY_PRIVATE_KEY_PATH:classpath:certs/server.key}
      clientAuth: NONE
