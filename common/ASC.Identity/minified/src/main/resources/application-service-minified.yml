grpc:
  client:
    registrationService:
      address: in-process:identity-minified
      negotiation-type: plaintext
    authorizationService:
      address: in-process:identity-minified
      negotiation-type: plaintext
  server:
    in-process-name: identity-minified
    port: ${GRPC_SERVER_PORT:-1}
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED:false}
      certificateChainPath: ${GRPC_SERVER_SECURITY_CERTIFICATE_PATH:classpath:certs/server.crt}
      privateKeyPath: ${GRPC_SERVER_SECURITY_PRIVATE_KEY_PATH:classpath:certs/server.key}
      clientAuth: NONE
